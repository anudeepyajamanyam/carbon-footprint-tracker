# ============================================================
# PRODUCTION PROFILE  (Spring profile: prod)
#
# Credentials are dynamically loaded from AWS Secrets Manager:
#   Secret ID: biometrck/prod/credentials
# ============================================================

# Server
server.port=${PORT:8080}

# PostgreSQL — dynamically populated by AwsSecretsInitializer (falls back to env vars if not found)
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET:9a67471b798416d8e288e2c3fb66ad0f3f2d2b512903dbbfa293c66fdfa2bc47}
jwt.expiration=86400000

# Actuator health check (for AWS/Railway health monitoring)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/json,application/javascript
server.compression.min-response-size=1024
