# Server configuration
server.port=8080

# H2 File-based Database (data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/carbondb;DB_CLOSE_DELAY=-1;AUTO_SERVER=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Connection pool (handles concurrent requests)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Defer datasource initialization so Hibernate creates tables before data.sql runs
spring.jpa.defer-datasource-initialization=true

# H2 Console configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret configurations (256-bit key hex encoded)
jwt.secret=9a67471b798416d8e288e2c3fb66ad0f3f2d2b512903dbbfa293c66fdfa2bc47
jwt.expiration=86400000

# Spring Cache (in-memory, no external dependencies)
spring.cache.type=simple

# Server compression for performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/json,application/javascript
server.compression.min-response-size=1024
